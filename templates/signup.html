{% extends "base.html" %}
{% block title %}Sign up — JobMatch{% endblock %}
{% block content %}
<div class="center-shell">
  <div class="auth-card">
    <h1 class="page-title">Create your account</h1>
    <p class="page-sub">One-time setup. You won't be asked for this again.</p>

    <a href="{{ url_for('login_google') }}" class="btn btn-google">
      Continue with Google
    </a>

    <div class="divider-or">or</div>

    <form method="POST">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="At least 8 characters" minlength="8">
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
    </form>
  </div>
  <p class="auth-foot">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>
{% endblock %}
